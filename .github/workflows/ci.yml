name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy isac/

      - name: Pytest
        # K8: branch coverage + 最低覆盖率门禁 (statement 75%, branch 45%)
        # 覆盖率下滑会阻止合并; 关键安全/启动路径 (K7/K1/K4) 已有专项测试
        run: uv run pytest --cov=isac --cov-branch --cov-report=term-missing --cov-fail-under=75

  build:
    # K8: 构建 wheel/sdist 并安装 smoke, 验证包可发布
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel and sdist
        run: uv build

      - name: Install from wheel
        run: |
          uv venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/python -m pip install dist/isac-*.whl
          /tmp/smoke-venv/bin/python -c "import isac; print(f'version={isac.__version__}')"

  docker:
    # K8: Docker build + 容器启动 + healthcheck smoke
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t isac:ci .

      - name: Run container and probe health
        run: |
          docker run -d --name isac-ci -p 8765:8765 \
            -e ISAC_CONTROL_ENABLED=true \
            -e ISAC_CONTROL_HOST=0.0.0.0 \
            -e ISAC_CONTROL_PORT=8765 \
            isac:ci
          # 等容器启动
          for i in {1..30}; do
            if curl -sf http://localhost:8765/health > /dev/null; then
              echo "health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "health check failed after 30s"
          docker logs isac-ci
          exit 1
        # 总是清理容器, 不论成功失败
      - name: Cleanup container
        if: always()
        run: docker rm -f isac-ci || true
